<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Button Groups Project</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- JS for dropdown -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Button Groups Demo</h2>

  <!-- Basic Group -->
  <h4>Basic Group</h4>
  <div class="btn-group">
    <button class="btn btn-primary">Home</button>
    <button class="btn btn-primary">About</button>
    <button class="btn btn-primary">Contact</button>
  </div>

  <hr>

  <!-- Sizes -->
  <h4>Sizes</h4>
  <div class="btn-group btn-group-lg">
    <button class="btn btn-success">Large</button>
    <button class="btn btn-success">Large</button>
  </div>

  <div class="btn-group mt-2">
    <button class="btn btn-warning">Default</button>
    <button class="btn btn-warning">Default</button>
  </div>

  <div class="btn-group btn-group-sm mt-2">
    <button class="btn btn-danger">Small</button>
    <button class="btn btn-danger">Small</button>
  </div>

  <hr>

  <!-- Vertical -->
  <h4>Vertical Group</h4>
  <div class="btn-group-vertical">
    <button class="btn btn-info">Top</button>
    <button class="btn btn-info">Middle</button>
    <button class="btn btn-info">Bottom</button>
  </div>

  <hr>

  <!-- Dropdown -->
  <h4>Dropdown Group</h4>
  <div class="btn-group">
    <button class="btn btn-primary">Menu</button>

    <div class="btn-group">
      <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
        Options
      </button>
      <div class="dropdown-menu">
        <a class="dropdown-item">Edit</a>
        <a class="dropdown-item">Delete</a>
      </div>
    </div>
  </div>

  <hr>

  <!-- Split Button -->
  <h4>Split Button</h4>
  <div class="btn-group">
    <button class="btn btn-dark">Action</button>
    <button class="btn btn-dark dropdown-toggle dropdown-toggle-split" data-toggle="dropdown"></button>

    <div class="dropdown-menu">
      <a class="dropdown-item">Save</a>
      <a class="dropdown-item">Update</a>
    </div>
  </div>

  <hr>

  <!-- Justified -->
  <h4>Full Width Group</h4>
  <div class="btn-group btn-group-justified d-flex">
    <a class="btn btn-primary flex-fill">Left</a>
    <a class="btn btn-success flex-fill">Middle</a>
    <a class="btn btn-danger flex-fill">Right</a>
  </div>

</body>
</html>
